<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{cspSource}}; style-src {{cspSource}}; script-src 'nonce-{{nonce}}' {{cspSource}};">
  <link rel="stylesheet" href="{{styleUri}}">
  <title>发发发 设置</title>
</head>
<body>
  <div class="header">
    <div class="header-title">
      <img class="header-logo" src="{{iconUri}}" alt="发发发" />
      <h1>发发发 股票设置</h1>
    </div>
    <p class="hint">上证指数为默认项不可删除；其余股票可拖拽排序或删除</p>
  </div>
  <div id="stock-list" class="stock-list"></div>
  <div id="add-row" class="add-row">
    <button id="add-btn" class="add-btn" title="添加股票">+</button>
  </div>
  <script nonce="{{nonce}}">{{inlineScript}}</script>
</body>
</html>
